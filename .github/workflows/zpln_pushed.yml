name: Convert Zpln to ipynb

on:
  push:
    paths:
      - '**.zpln'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: zpln 브랜치 checkout
      uses: actions/checkout@v4

    - name: main 브랜치에서 scripts 가져오기
      uses: actions/checkout@v4
      with:
        ref: main
        path: main_scripts

    - name: ipynb 브랜치 checkout
      uses: actions/checkout@v4
      with:
        ref: ipynb
        path: ipynb_branch

    - name: zpln → ipynb 변환
      run: |
        find . -name "*.zpln" \
          -not -path "./main_scripts/*" \
          -not -path "./ipynb_branch/*" | while read zpln_file; do
          rel="${zpln_file#./}"
          ipynb_file="ipynb_branch/${rel%.zpln}.ipynb"
          python3 main_scripts/scripts/convert.py "$zpln_file" "$ipynb_file"
        done

    - name: ipynb 브랜치에 커밋 & 푸시
      run: |
        cd ipynb_branch
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if git diff --cached --quiet; then
          echo "변경사항 없음, 스킵"
        else
          git commit -m "auto: zpln→ipynb 변환 [skip ci]"
          git pull --rebase
          git push
        fi